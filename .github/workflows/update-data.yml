name: Update Alert Data

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes (GitHub Actions minimum)
  workflow_dispatch:         # manual trigger from GitHub UI
  repository_dispatch:       # trigger via GitHub API (used by the site's refresh button)
    types: [refresh]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch alert data
        run: python fetch_data.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "data: update [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
